name: Build

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Keystore
        if: inputs.buildType == 'release'
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -storepass gitlaunch123 \
            -keypass gitlaunch123 \
            -alias gitlaunch \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=GithubLauncher,O=Rhyan57,C=BR"

      - name: Generate Debug Keystore
        if: inputs.buildType == 'debug'
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -storepass gitlaunch123 \
            -keypass gitlaunch123 \
            -alias gitlaunch \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=GithubLauncher,O=Rhyan57,C=BR"

      - name: Build APK
        run: gradle :app:assemble${{ inputs.buildType == 'release' && 'Release' || 'Debug' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GithubLauncher-${{ inputs.buildType }}
          path: app/build/outputs/apk/${{ inputs.buildType }}/*.apk

  release:
    if: inputs.buildType == 'release'
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: GitHub Launcher v1.0.${{ github.run_number }}
          files: dist/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
